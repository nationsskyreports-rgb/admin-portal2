<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Migration Tool</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 32px; width: 100%; max-width: 600px; }
  h1 { font-size: 20px; color: #f1f5f9; margin-bottom: 8px; }
  .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#D4AF37,#F4D03F); color: #000; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; margin-bottom: 20px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .log { background: #0f172a; border-radius: 10px; padding: 16px; font-size: 12px; font-family: monospace; max-height: 320px; overflow-y: auto; line-height: 1.8; }
  .ok   { color: #4ade80; }
  .err  { color: #f87171; }
  .info { color: #94a3b8; }
  .warn { color: #fbbf24; }
  .summary { margin-top: 16px; padding: 16px; border-radius: 10px; font-size: 14px; font-weight: 600; display: none; }
  .summary.success { background: rgba(74,222,128,0.1); border: 1px solid #4ade80; color: #4ade80; }
  .summary.warn    { background: rgba(251,191,36,0.1);  border: 1px solid #fbbf24; color: #fbbf24; }
  .delete-note { margin-top: 16px; font-size: 12px; color: #ef4444; background: rgba(239,68,68,0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.3); }
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Agent Migration Tool</h1>
  <p class="sub">بتعمل Supabase Auth user لكل agent — شغّلها مرة واحدة بس ثم احذف الصفحة</p>
  <button class="btn" id="runBtn" onclick="runMigration()">▶ ابدأ الـ Migration</button>
  <div class="log" id="log"><span class="info">جاهز — اضغط الزرار للبدء...</span></div>
  <div class="summary" id="summary"></div>
  <div class="delete-note" id="deleteNote" style="display:none">⚠️ خلصت! دلوقتي احذف هذه الصفحة من الـ repository فوراً.</div>
</div>

<script>
const SUPABASE_URL     = 'https://xzxdaupwwwdcwfnqweub.supabase.co';
const SERVICE_ROLE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6eGRhdXB3d3dkY3dmbnF3ZXViIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTMxMzk1MCwiZXhwIjoyMDkwODg5OTUwfQ.hloV3fkC_KIa36hYgxz33fdTWvH_0AX28cZaiohPcDQ';

const sb = supabase.createClient(SUPABASE_URL, SERVICE_ROLE_KEY, {
  auth: { autoRefreshToken: false, persistSession: false }
});

const logEl  = document.getElementById('log');
const sumEl  = document.getElementById('summary');
const delEl  = document.getElementById('deleteNote');
const runBtn = document.getElementById('runBtn');

function log(msg, type = 'info') {
  const line = document.createElement('div');
  line.className = type;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

async function runMigration() {
  runBtn.disabled = true;
  logEl.innerHTML = '';
  log('جاري جيب الـ agents...', 'info');

  // جيب كل الـ agents اللي مفيهمش auth_id
  const { data: agents, error } = await sb
    .from('agents')
    .select('id, formal_name, email, password_hash, status')
    .is('auth_id', null);

  if (error) { log('❌ خطأ: ' + error.message, 'err'); runBtn.disabled = false; return; }
  if (!agents || agents.length === 0) {
    log('✅ كل الـ agents عندهم auth_id بالفعل — مفيش حاجة تتعمل', 'ok');
    showSummary(0, 0); return;
  }

  log(`✅ لقيت ${agents.length} agent محتاج migration\n`, 'ok');
  let success = 0, failed = 0;

  for (const agent of agents) {
    const email = (agent.email || '').trim() ||
      agent.formal_name.toLowerCase().replace(/\s+/g, '.') + '@nos.internal';
    const password = agent.password_hash || 'NOS@2025!';

    log(`⏳ ${agent.formal_name} (${email})...`, 'info');

    try {
      // حاول تعمل user جديد
      let authId = null;
      const { data: created, error: createErr } = await sb.auth.admin.createUser({
        email,
        password,
        email_confirm: true,
        user_metadata: { formal_name: agent.formal_name, agent_id: agent.id }
      });

      if (createErr) {
        // لو موجود بالفعل — جيب الـ id بتاعه
        if (createErr.message?.includes('already') || createErr.message?.includes('registered')) {
          const { data: list } = await sb.auth.admin.listUsers({ perPage: 1000 });
          const existing = list?.users?.find(u => u.email === email);
          if (existing) { authId = existing.id; log(`  ♻️ موجود بالفعل`, 'warn'); }
          else throw new Error(createErr.message);
        } else throw new Error(createErr.message);
      } else {
        authId = created.user.id;
      }

      // احفظ auth_id في agents table
      const { error: updErr } = await sb
        .from('agents').update({ auth_id: authId }).eq('id', agent.id);
      if (updErr) throw new Error(updErr.message);

      log(`  ✅ تم`, 'ok');
      success++;
    } catch(e) {
      log(`  ❌ فشل: ${e.message}`, 'err');
      failed++;
    }

    await new Promise(r => setTimeout(r, 150));
  }

  log('\n══════════════════════════════', 'info');
  log(`✅ نجح: ${success}`, 'ok');
  if (failed) log(`❌ فشل: ${failed}`, 'err');
  showSummary(success, failed);
}

function showSummary(ok, fail) {
  sumEl.style.display = 'block';
  delEl.style.display = 'block';
  if (fail === 0) {
    sumEl.className = 'summary success';
    sumEl.textContent = `✅ خلاص! ${ok} agent اتعمل لهم Supabase Auth. دلوقتي شغّل step3a-rls-setup.sql في Supabase.`;
  } else {
    sumEl.className = 'summary warn';
    sumEl.textContent = `⚠️ نجح ${ok} وفشل ${fail}. شوف الـ errors فوق وحاول تاني.`;
  }
}
</script>
</body>
</html>
